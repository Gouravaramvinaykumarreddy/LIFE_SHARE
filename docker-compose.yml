version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lifeshare-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifeshare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./server
    container_name: lifeshare-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lifeshare
      - JWT_SECRET=lifeshare_secret_key
      - PORT=5000
    depends_on:
      - db

  frontend:
    build: ./client
    container_name: lifeshare-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
